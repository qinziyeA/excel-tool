<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>データ修正ツール</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}
.main{max-width:1000px;margin:40px auto;}
.card{background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.upload-box{
  border:2px dashed #ccc;
  padding:30px;
  text-align:center;
  cursor:pointer;
  border-radius:8px;
  margin-bottom:10px;
  transition:0.2s;
}
.upload-box:hover{border-color:#1677ff;}
.settings{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:20px;
}
input{padding:10px;border:1px solid #ddd;border-radius:6px;}
button{margin-top:20px;padding:12px;background:#1677ff;color:white;border:none;border-radius:6px;width:100%;}
.log{margin-top:20px;background:#111827;color:#d1fae5;padding:12px;border-radius:6px;font-family:monospace;}
</style>
</head>

<body>

<div class="main">
<div class="card">

<h2>データ修正ツール</h2>

<div id="targetBox" class="upload-box">拖拽或点击上传东京菜鸟表</div>
<input id="targetFile" type="file" hidden>

<div id="refBox" class="upload-box">拖拽或点击上传黑猫参照表</div>
<input id="refFile" type="file" hidden>

<div class="settings">
<input id="addressCol" value="F">
<input id="phoneCol" value="C">
<input id="startRow" value="1">
<input id="zipCol" value="E">
<input id="sortCodeCol" value="U">
</div>

<button id="runBtn">开始处理</button>

<div id="log" class="log">等待上传文件...</div>

</div>
</div>

<script>
const $=id=>document.getElementById(id);

function log(msg){$("log").textContent+="\n"+msg;}

// 列字母转索引
function colIndex(letter){
  let n=0;
  for(let i=0;i<letter.length;i++){
    n=n*26+letter.charCodeAt(i)-64;
  }
  return n-1;
}

// 手机号处理
function normalizePhone(v){
  if(!v) return "00000000";
  v=String(v).trim();
  if(v.startsWith("+")) return v.slice(3);
  return v;
}

// 地址截取（你要求的逻辑）
function trimAddress(addr){
  if(!addr) return "";
  addr=addr.replace(/\s/g,"");

  const cityMatch=addr.match(/(市|区|町|郡)/);
  if(cityMatch){
    return addr.slice(cityMatch.index+1);
  }

  const prefMatch=addr.match(/(都|道|府|県)/);
  if(prefMatch){
    return addr.slice(prefMatch.index+1);
  }

  return addr;
}

// ⭐ 关键：安全拖拽绑定
function bindUpload(box,input){

  box.addEventListener("click",()=>input.click());

  box.addEventListener("dragover",e=>{
    e.preventDefault();
    box.style.borderColor="#1677ff";
  });

  box.addEventListener("dragleave",()=>{
    box.style.borderColor="#ccc";
  });

  box.addEventListener("drop",e=>{
    e.preventDefault();
    box.style.borderColor="#ccc";

    const files=e.dataTransfer.files;
    if(files.length>0){
      // ⭐ 用 DataTransfer 解决浏览器限制
      const dt=new DataTransfer();
      dt.items.add(files[0]);
      input.files=dt.files;

      box.textContent="已选择: "+files[0].name;
    }
  });

  input.addEventListener("change",()=>{
    if(input.files.length>0){
      box.textContent="已选择: "+input.files[0].name;
    }
  });
}

bindUpload($("targetBox"),$("targetFile"));
bindUpload($("refBox"),$("refFile"));

$("runBtn").onclick=async()=>{

  const target=$("targetFile").files[0];
  const ref=$("refFile").files[0];

  if(!target||!ref){
    alert("请上传文件");
    return;
  }

  log("读取文件...");

  const read=async file=>{
    const data=await file.arrayBuffer();
    return XLSX.read(data,{type:"array"});
  };

  const targetWb=await read(target);
  const refWb=await read(ref);

  let targetRows=XLSX.utils.sheet_to_json(targetWb.Sheets[targetWb.SheetNames[0]],{header:1});
  let refRows=XLSX.utils.sheet_to_json(refWb.Sheets[refWb.SheetNames[0]],{header:1});

  // 黑猫索引
  const map={};
  for(let i=1;i<refRows.length;i++){
    let r=refRows[i];
    if(!r) continue;

    map[trimAddress(r[4])] = {
      zip:r[0],
      code:r[1]
    };
  }

  const addrCol=colIndex($("addressCol").value);
  const phoneCol=colIndex($("phoneCol").value);
  const zipCol=colIndex($("zipCol").value);
  const sortCol=colIndex($("sortCodeCol").value);
  const startRow=parseInt($("startRow").value)-1;

  for(let i=startRow;i<targetRows.length;i++){
    let r=targetRows[i];
    if(!r) continue;

    r[phoneCol]=normalizePhone(r[phoneCol]);

    if(!r[zipCol]){
      let addr=trimAddress(r[addrCol]);
      if(map[addr]){
        r[zipCol]=map[addr].zip;
        r[sortCol]=map[addr].code;
      }
    }
  }

  log("处理完成");

  // ⭐ 导出SJIS CSV（日本系统用）
  const newWs=XLSX.utils.aoa_to_sheet(targetRows);
  const csv=XLSX.utils.sheet_to_csv(newWs);

  const sjis=Encoding.convert(csv,{
    to:"SJIS",
    from:"UNICODE",
    type:"array"
  });

  const blob=new Blob([new Uint8Array(sjis)],{type:"text/csv"});
  const link=document.createElement("a");

  link.href=URL.createObjectURL(blob);
  link.download="result.csv";
  link.click();

  log("导出完成");
};
</script>

</body>
</html>
