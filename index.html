<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>データ修正ツール</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
}

.main{
  max-width:1000px;
  margin:40px auto;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.upload-box{
  border:2px dashed #ccc;
  padding:30px;
  text-align:center;
  cursor:pointer;
  border-radius:8px;
  margin-bottom:10px;
}

.settings{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:20px;
}

input{
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  margin-top:20px;
  padding:12px;
  background:#1677ff;
  color:white;
  border:none;
  border-radius:6px;
  width:100%;
}

.log{
  margin-top:20px;
  background:#111827;
  color:#d1fae5;
  padding:12px;
  border-radius:6px;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="main">
<div class="card">

<h2>データ修正ツール</h2>

<div id="targetBox" class="upload-box">拖拽或点击上传东京菜鸟表</div>
<input id="targetFile" type="file" hidden>

<div id="refBox" class="upload-box">拖拽或点击上传黑猫参照表</div>
<input id="refFile" type="file" hidden>

<div class="settings">
  <input id="addressCol" value="F" placeholder="地址列">
  <input id="phoneCol" value="C" placeholder="手机号列">
  <input id="startRow" value="1" placeholder="开始行">
  <input id="zipCol" value="E" placeholder="邮编输出列">
  <input id="sortCodeCol" value="U" placeholder="分拣码输出列">
</div>

<button id="runBtn">开始处理</button>

<div id="log" class="log">等待上传文件...</div>

</div>
</div>

<script>
const $ = id => document.getElementById(id);

function log(msg){
  $("log").textContent += "\n" + msg;
}

// 列字母 → 索引
function colIndex(letter){
  let n=0;
  for(let i=0;i<letter.length;i++){
    n=n*26+letter.charCodeAt(i)-64;
  }
  return n-1;
}

// 手机号处理
function normalizePhone(v){
  if(!v) return "00000000";
  v=String(v).trim();
  if(!v.startsWith("+")) return v;
  return v.slice(3);
}

// ⭐地址处理（你的最终逻辑）
function trimAddress(addr){
  if(!addr) return "";
  addr=addr.replace(/\s/g,"");

  const cityMatch=addr.match(/(市|区|町|郡)/);
  if(cityMatch){
    return addr.slice(cityMatch.index+1);
  }

  const prefMatch=addr.match(/(都|道|府|県)/);
  if(prefMatch){
    return addr.slice(prefMatch.index+1);
  }

  return addr;
}

// 拖拽支持
function bindUpload(box,input){
  box.onclick=()=>input.click();

  box.ondragover=e=>{
    e.preventDefault();
    box.style.borderColor="#1677ff";
  };

  box.ondragleave=()=>{
    box.style.borderColor="#ccc";
  };

  box.ondrop=e=>{
    e.preventDefault();
    box.style.borderColor="#ccc";
    input.files=e.dataTransfer.files;
  };
}

bindUpload($("targetBox"),$("targetFile"));
bindUpload($("refBox"),$("refFile"));

$("runBtn").onclick=async()=>{

  const target=$("targetFile").files[0];
  const ref=$("refFile").files[0];

  if(!target||!ref){
    alert("请上传文件");
    return;
  }

  log("开始处理...");

  // 读取黑猫
  const refData=await ref.arrayBuffer();
  const refWb=XLSX.read(refData,{type:"array"});
  const refWs=refWb.Sheets["Sheet1"];
  const refRows=XLSX.utils.sheet_to_json(refWs,{header:1});

  // 建立地址map
  const map={};
  for(let i=1;i<refRows.length;i++){
    let r=refRows[i];
    if(!r) continue;

    let addr=trimAddress(r[4]);
    map[addr]={
      zip:r[0],
      code:r[1]
    };
  }

  log("黑猫数据读取完成");

  // 读取东京菜鸟
  const data=await target.arrayBuffer();
  const wb=XLSX.read(data,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  let rows=XLSX.utils.sheet_to_json(ws,{header:1});

  const phoneCol=colIndex($("phoneCol").value);
  const addrCol=colIndex($("addressCol").value);
  const zipCol=colIndex($("zipCol").value);
  const sortCol=colIndex($("sortCodeCol").value);
  const startRow=parseInt($("startRow").value)-1;

  for(let i=startRow;i<rows.length;i++){
    let r=rows[i];
    if(!r) continue;

    // 手机号
    r[phoneCol]=normalizePhone(r[phoneCol]);

    // 邮编为空才匹配
    if(!r[zipCol]){
      let addr=trimAddress(r[addrCol]);

      if(map[addr]){
        r[zipCol]=map[addr].zip;
        r[sortCol]=map[addr].code;
      }
    }
  }

  log("数据处理完成");

  // ⭐导出 CSV（SJIS防乱码）
  const newWs=XLSX.utils.aoa_to_sheet(rows);
  const csv=XLSX.utils.sheet_to_csv(newWs);

  const sjis=Encoding.convert(csv,{
    to:"SJIS",
    from:"UNICODE",
    type:"array"
  });

  const blob=new Blob([new Uint8Array(sjis)],{type:"text/csv"});
  const link=document.createElement("a");

  link.href=URL.createObjectURL(blob);
  link.download="result.csv";
  link.click();

  log("导出完成！");
};
</script>

</body>
</html>
