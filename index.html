<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>データ修正＆検証ツール</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f5f7fa;}
.sidebar{width:220px;height:100vh;background:#fff;border-right:1px solid #eee;position:fixed;}
.sidebar h2{padding:20px;}
.sidebar li{list-style:none;padding:12px 20px;}
.sidebar li.active{background:#e6f0ff;color:#1677ff;}
.main{margin-left:220px;padding:30px;}
.card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.upload-box{border:2px dashed #ccc;padding:40px;text-align:center;border-radius:8px;cursor:pointer;}
.settings{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;}
input{padding:10px;border:1px solid #ddd;border-radius:6px;}
button{margin-top:20px;padding:12px;background:#1677ff;color:#fff;border:none;border-radius:6px;}
.log{margin-top:20px;background:#111827;color:#d1fae5;padding:12px;border-radius:6px;font-family:monospace;white-space:pre-wrap;}
</style>
</head>

<body>

<div class="sidebar">
<h2>espoirer</h2>
<ul>
<li>状況確認</li>
<li>通関関係</li>
<li class="active">データ修正</li>
</ul>
</div>

<div class="main">
<div class="card">

<h2>データ修正＆検証ツール</h2>

<div onclick="targetFile.click()" class="upload-box">上传东京菜鸟表</div>
<input id="targetFile" type="file" style="display:none">

<div onclick="refFile.click()" class="upload-box" style="margin-top:10px;">上传黑猫参照表</div>
<input id="refFile" type="file" style="display:none">

<div class="settings">
<input id="addressCol" value="F">
<input id="phoneCol" value="C">
<input id="startRow" value="1">
<input id="zipCol" value="E">
<input id="sortCodeCol" value="U">
</div>

<button id="runBtn">开始处理</button>

<div id="log" class="log">等待上传文件...</div>

</div>
</div>

<script>
const $=id=>document.getElementById(id);

function log(t){$("log").textContent+="\n"+t;}

function colIndex(l){
let n=0;
for(let i=0;i<l.length;i++){
n=n*26+l.charCodeAt(i)-64;
}
return n-1;
}

function normalizePhone(v){
if(!v) return "00000000";
v=String(v).trim();
if(v.startsWith("+")) return v.slice(3);
return v;
}

// 🔥 完整地址截取（恢复你的逻辑）
function trimAddress(addr){
if(!addr) return "";
addr=addr.replace(/\s/g,"");

const prefRegex=/(都|道|府|県)/;
let idx=addr.search(prefRegex);

if(idx===-1) return addr;

let sub=addr.slice(idx+1);

const cityRegex=/(市|区|町|郡)/;
let cityIdx=sub.search(cityRegex);

if(cityIdx!==-1){
return sub.slice(cityIdx+1);
}
return sub;
}

// 🔥 CSV读取（支持SJIS）
function readFile(file){
return new Promise(resolve=>{
const reader=new FileReader();

reader.onload=e=>{
let data=new Uint8Array(e.target.result);

let wb;
try{
wb=XLSX.read(data,{type:"array"});
}catch{
const str=Encoding.convert(data,{to:"UNICODE",from:"SJIS",type:"string"});
wb=XLSX.read(str,{type:"string"});
}
resolve(wb);
};

reader.readAsArrayBuffer(file);
});
}

$("runBtn").onclick=async()=>{

const target=$("targetFile").files[0];
const ref=$("refFile").files[0];

if(!target||!ref){
alert("请上传文件");
return;
}

log("读取文件...");

const targetWb=await readFile(target);
const refWb=await readFile(ref);

let targetRows=XLSX.utils.sheet_to_json(
targetWb.Sheets[targetWb.SheetNames[0]],{header:1});

let refRows=XLSX.utils.sheet_to_json(
refWb.Sheets[refWb.SheetNames[0]],{header:1});

const refIndex=refRows.map(r=>({
zip:r[0],
code:r[1],
addr:trimAddress(r[4])
}));

const addrCol=colIndex($("addressCol").value);
const phoneCol=colIndex($("phoneCol").value);
const zipCol=colIndex($("zipCol").value);
const sortCol=colIndex($("sortCodeCol").value);
const startRow=parseInt($("startRow").value)-1;

let ok=0,fail=0,skip=0;

for(let i=startRow;i<targetRows.length;i++){
let r=targetRows[i];
if(!r) continue;

// 手机号
r[phoneCol]=normalizePhone(r[phoneCol]);

// 已有邮编跳过
if(r[zipCol]){
skip++;
continue;
}

let addr=trimAddress(r[addrCol]);

let hit=refIndex.find(x=>x.addr && addr.startsWith(x.addr));

if(hit){
r[zipCol]=hit.zip;
r[sortCol]=hit.code;
ok++;
}else{
fail++;
}
}

log("成功："+ok);
log("失败："+fail);
log("跳过："+skip);

const newWs=XLSX.utils.aoa_to_sheet(targetRows);
const csv=XLSX.utils.sheet_to_csv(newWs);

const sjis=Encoding.convert(csv,{
to:"SJIS",
from:"UNICODE",
type:"array"
});

const blob=new Blob([new Uint8Array(sjis)],{type:"text/csv"});
const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="result.csv";
link.click();

log("完成");
};
</script>

</body>
</html>
