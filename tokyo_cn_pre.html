<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>东京菜鸟表处理工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.0.0/encoding.min.js"></script>
  <style>
    body {
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 24px;
      color: #222;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; font-size: 24px; }
    .note {
      background: #fff8e5;
      border-left: 5px solid #f0b429;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    input[type="file"], select, input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #bbb;
      background: #fff;
    }
    .settings {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #999; cursor: not-allowed; }
    .log {
      margin-top: 18px;
      padding: 14px;
      background: #111827;
      color: #d1fae5;
      border-radius: 10px;
      white-space: pre-wrap;
      min-height: 110px;
      font-family: Consolas, monospace;
      font-size: 13px;
    }
    .small { color: #666; font-size: 13px; line-height: 1.5; }
    @media (max-width: 800px) {
      .grid, .settings { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>东京菜鸟表处理工具</h1>
    <div class="note">
      <b>用途：</b>上传需要处理的东京菜鸟表 + 黑猫参照表。工具会处理手机号，按地址/邮编参照黑猫表补充邮编和分拣码。所有处理都在浏览器本地完成，不会上传到服务器。<br>
      <b>本版说明：</b>本版按 U列分拣码是否为空作为主要处理入口：U列已有值的行默认不检查、不覆盖；U列为空时才按完整地址/已有邮编/简化地址去补充或修正 E列邮编和 U列分拣码。
    </div>

    <div class="grid">
      <div class="card">
        <label>① 东京菜鸟表（需要修改的文件）</label>
        <input id="targetFile" type="file" accept=".xlsx,.xls,.csv" />
        <p class="small">默认读取第一个Sheet。C列手机号会原地修改；重点处理U列分拣码为空的行；匹配/修正结果写入E列和U列。</p>
      </div>
      <div class="card">
        <label>② 黑猫参照表</label>
        <input id="refFile" type="file" accept=".xlsx,.xls" />
        <p class="small">默认读取 Sheet1。要求：A列=邮编，B列=分拣码，E列=完整地址。</p>
      </div>
    </div>

    <div class="settings">
      <div>
        <label>东京菜鸟：原始地址列</label>
        <input id="addressCol" type="text" value="F" />
      </div>
      <div>
        <label>东京菜鸟：手机号列（原地修改）</label>
        <input id="phoneCol" type="text" value="C" />
      </div>
      <div>
        <label>开始行</label>
        <input id="startRow" type="text" value="1" />
      </div>
      <div>
        <label>输出：黑猫A列邮编 → 菜鸟列</label>
        <input id="zipCol" type="text" value="E" />
      </div>
      <div>
        <label>输出：黑猫B列分拣码 → 菜鸟列</label>
        <input id="sortCodeCol" type="text" value="U" />
      </div>
    </div>

    <button id="runBtn">开始处理并下载结果</button>
    <div id="log" class="log">等待上传文件...</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  function log(message) {
    $("log").textContent += "\n" + message;
  }

  function resetLog(message) {
    $("log").textContent = message;
  }

  function colLetterToIndex(letter) {
    const s = String(letter).trim().toUpperCase();
    let n = 0;
    for (let i = 0; i < s.length; i++) {
      const code = s.charCodeAt(i);
      if (code < 65 || code > 90) throw new Error("列名不正确: " + letter);
      n = n * 26 + (code - 64);
    }
    return n - 1;
  }

  function getCell(row, colIndex) {
    const v = row[colIndex];
    return v == null ? "" : String(v).trim();
  }

  function cleanSpaces(value) {
    return String(value == null ? "" : value)
      .replace(/\u3000/g, "")
      .replace(/\s+/g, "")
      .trim();
  }

  function toHalfWidthDigits(value) {
    return String(value == null ? "" : value).replace(/[０-９]/g, (ch) => {
      return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
    });
  }

  function normalizeZipKey(value) {
    return toHalfWidthDigits(value).replace(/[^0-9]/g, "");
  }

  function normalizeSortCodeKey(value) {
    return cleanSpaces(value);
  }

  function findFromSecondCharAfterPrefecture(s, chars) {
    const prefectureMarks = ["県", "都", "府", "道"];
    let p = -1;
    for (const mark of prefectureMarks) {
      const i = s.indexOf(mark);
      if (i >= 0 && (p < 0 || i < p)) p = i;
    }

    // 无视都道府県后面出现的第一个字。
    // 例：千葉県市原市 -> 从「市原市」的第二个字符开始找，所以会命中后面的「市」。
    const start = p >= 0 ? p + 2 : 0;

    let best = -1;
    for (const ch of chars) {
      const idx = s.indexOf(ch, start);
      if (idx >= 0 && (best < 0 || idx < best)) best = idx;
    }
    return best;
  }

  function trimJapaneseAddress(value) {
    const s = cleanSpaces(value);
    if (!s) return "";

    // 先找区/町；找不到再找市/郡。
    let pos = findFromSecondCharAfterPrefecture(s, ["区", "町"]);
    if (pos < 0) pos = findFromSecondCharAfterPrefecture(s, ["市", "郡"]);

    return pos >= 0 ? s.slice(0, pos + 1) : s;
  }

  function normalizePhone(value) {
    const s = String(value == null ? "" : value).replace(/\s+/g, "");
    if (!s) return "00000000";
    if (!s.startsWith("+")) return s;
    if (s.length <= 3) return "00000000";
    return s.slice(3);
  }

  function readWorkbook(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          resolve(XLSX.read(data, { type: "array", raw: true, cellText: false, cellDates: false }));
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  function readTargetWorkbook(file) {
    const isCsv = /\.csv$/i.test(file.name);
    if (!isCsv) return readWorkbook(file);

    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const buffer = e.target.result;
          let text;

          try {
            text = new TextDecoder("shift-jis").decode(buffer);
          } catch (_) {
            text = new TextDecoder("utf-8").decode(buffer);
          }

          const wb = XLSX.read(text, { type: "string", raw: true });
          resolve(wb);
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  function buildReferenceIndex(refRows) {
    // 黑猫表：A列=邮编, B列=分拣码, E列=完整地址
    const byAddress = [];
    const byZip = new Map();

    for (let i = 0; i < refRows.length; i++) {
      const row = refRows[i];
      const zip = getCell(row, 0);
      const sortCode = getCell(row, 1);
      const fullAddress = cleanSpaces(getCell(row, 4));
      const zipKey = normalizeZipKey(zip);
      if (!fullAddress && !zipKey) continue;

      const item = { fullAddress, zip, sortCode, zipKey, rowNumber: i + 1 };

      if (fullAddress) {
        byAddress.push(item);
      }

      // 同一个邮编如果重复，只保留参照表里第一次出现的记录，用于“已有邮编但分拣码为空”的补充。
      if (zipKey && !byZip.has(zipKey)) {
        byZip.set(zipKey, item);
      }
    }

    // 长地址优先，避免先命中很粗的地址。
    byAddress.sort((a, b) => b.fullAddress.length - a.fullAddress.length);

    return { byAddress, byZip };
  }

  function lookupByFullAddress(originalAddress, refIndex) {
    const full = cleanSpaces(originalAddress);
    if (!full) return null;

    // 只有“菜鸟原始地址以黑猫完整地址开头”才算完整地址匹配。
    // 不用 item.fullAddress.startsWith(full)，避免只有「東京都江東区」这种粗地址时误匹配到任意一条。
    for (const item of refIndex.byAddress) {
      if (item.fullAddress && full.startsWith(item.fullAddress)) {
        return item;
      }
    }
    return null;
  }

  function lookupByTrimmedAddress(trimmedAddress, refIndex) {
    if (!trimmedAddress) return null;
    for (const item of refIndex.byAddress) {
      if (item.fullAddress && item.fullAddress.startsWith(trimmedAddress)) {
        return item;
      }
    }
    return null;
  }

  function lookupByZip(zip, refIndex) {
    const zipKey = normalizeZipKey(zip);
    if (!zipKey) return null;
    return refIndex.byZip.get(zipKey) || null;
  }

  function addDetail(detailLogs, message) {
    if (detailLogs.length < 50) {
      detailLogs.push(message);
    }
  }

  $("runBtn").addEventListener("click", async () => {
    try {
      resetLog("处理中...");

      const targetFile = $("targetFile").files[0];
      const refFile = $("refFile").files[0];
      if (!targetFile || !refFile) {
        alert("请先上传东京菜鸟表和黑猫参照表。");
        resetLog("等待上传文件...");
        return;
      }

      const addressCol = colLetterToIndex($("addressCol").value);
      const phoneCol = colLetterToIndex($("phoneCol").value);
      const startRow = Math.max(1, parseInt($("startRow").value, 10) || 1) - 1;
      const zipCol = colLetterToIndex($("zipCol").value);
      const sortCodeCol = colLetterToIndex($("sortCodeCol").value);

      log("读取东京菜鸟表...");
      const targetWb = await readTargetWorkbook(targetFile);
      const targetSheetName = targetWb.SheetNames[0];
      const targetWs = targetWb.Sheets[targetSheetName];
      const targetRows = XLSX.utils.sheet_to_json(targetWs, { header: 1, raw: false, defval: "" });

      log("读取黑猫参照表...");
      const refWb = await readWorkbook(refFile);
      const refSheetName = refWb.SheetNames.includes("Sheet1") ? "Sheet1" : refWb.SheetNames[0];
      const refWs = refWb.Sheets[refSheetName];
      const refRows = XLSX.utils.sheet_to_json(refWs, { header: 1, raw: false, defval: "" });

      log("建立黑猫地址索引...");
      const refIndex = buildReferenceIndex(refRows);
      log("黑猫参照地址数量: " + refIndex.byAddress.length);
      log("黑猫参照邮编数量: " + refIndex.byZip.size);

      let processed = 0;
      let changedRows = 0;
      let skippedSortCodeExists = 0;
      let filledByFullAddress = 0;
      let correctedZipByFullAddress = 0;
      let filledSortByExistingZip = 0;
      let filledByTrimmedAddressNeedCheck = 0;
      let unmatchedSortBlank = 0;
      const detailLogs = [];

      for (let r = startRow; r < targetRows.length; r++) {
        const row = targetRows[r];
        if (!row || row.length === 0) continue;

        const excelRowNumber = r + 1;
        const originalAddress = getCell(row, addressCol);
        const phone = getCell(row, phoneCol);

        // 手机号：空白补00000000；不是+开头则原样保留；+开头才删除前3位。
        row[phoneCol] = normalizePhone(phone);

        const existingZip = getCell(row, zipCol);
        const existingZipKey = normalizeZipKey(existingZip);
        const existingSortCode = getCell(row, sortCodeCol);
        const existingSortCodeKey = normalizeSortCodeKey(existingSortCode);
        const trimmedAddress = trimJapaneseAddress(originalAddress);

        // 你的业务规则：真正需要检查的问题行，主要都是 U列分拣码为空的行。
        // 所以 U列已有分拣码时，默认不检查、不覆盖 E/U，避免误改本来完整的数据。
        if (existingSortCodeKey) {
          skippedSortCodeExists++;
          processed++;
          continue;
        }

        const hitByFullAddress = lookupByFullAddress(originalAddress, refIndex);
        const hitByZip = existingZip ? lookupByZip(existingZip, refIndex) : null;
        const hitByTrimmedAddress = !hitByFullAddress
          ? lookupByTrimmedAddress(trimmedAddress, refIndex)
          : null;

        if (hitByFullAddress) {
          const hitZipKey = normalizeZipKey(hitByFullAddress.zip);

          // U列为空时，完整地址匹配结果优先级最高。
          // 这样可以同时处理：E列空白、E列邮编错误、E列有邮编但U列缺失。
          if (!existingZipKey) {
            row[zipCol] = hitByFullAddress.zip;
            row[sortCodeCol] = hitByFullAddress.sortCode;
            filledByFullAddress++;
            changedRows++;
            addDetail(detailLogs, `第${excelRowNumber}行：U列空白，按完整地址补充 E/U → ${hitByFullAddress.zip} / ${hitByFullAddress.sortCode}`);
          } else if (hitZipKey && existingZipKey !== hitZipKey) {
            row[zipCol] = hitByFullAddress.zip;
            row[sortCodeCol] = hitByFullAddress.sortCode;
            correctedZipByFullAddress++;
            changedRows++;
            addDetail(detailLogs, `第${excelRowNumber}行：U列空白，且E列邮编与完整地址不一致，已修正 E/U：${existingZip} → ${hitByFullAddress.zip}，分拣码 → ${hitByFullAddress.sortCode}`);
          } else {
            row[sortCodeCol] = hitByFullAddress.sortCode;
            filledByFullAddress++;
            changedRows++;
            addDetail(detailLogs, `第${excelRowNumber}行：U列空白，E列邮编与完整地址一致，补充U列 → ${hitByFullAddress.sortCode}`);
          }
        } else if (hitByZip && hitByZip.sortCode) {
          // 完整地址没有匹配到时，再用已有E列邮编补U列。
          // 这里不修改E列，只补U列。
          row[sortCodeCol] = hitByZip.sortCode;
          filledSortByExistingZip++;
          changedRows++;
          addDetail(detailLogs, `第${excelRowNumber}行：U列空白，完整地址未命中，按已有E列邮编补U列 → ${hitByZip.sortCode}`);
        } else if (!existingZipKey && hitByTrimmedAddress) {
          // 最后才使用简化地址，且只在E列也为空时使用，避免粗地址误改已有邮编。
          row[zipCol] = hitByTrimmedAddress.zip;
          row[sortCodeCol] = hitByTrimmedAddress.sortCode;
          filledByTrimmedAddressNeedCheck++;
          changedRows++;
          addDetail(detailLogs, `第${excelRowNumber}行：U列和E列都空，按简化地址补充 E/U（需人工确认） → ${hitByTrimmedAddress.zip} / ${hitByTrimmedAddress.sortCode}`);
        } else {
          unmatchedSortBlank++;
          addDetail(detailLogs, `第${excelRowNumber}行：U列空白，但完整地址/已有邮编/简化地址均未匹配，未修改`);
        }

        processed++;
      }

      log("处理完成。总行数: " + processed);
      log("实际修改行数: " + changedRows);
      log("U列已有分拣码，未检查/未修改: " + skippedSortCodeExists);
      log("U列空白，按完整地址补充/填写: " + filledByFullAddress);
      log("U列空白，按完整地址修正E列邮编并填写U列: " + correctedZipByFullAddress);
      log("U列空白，按已有E列邮编补U列: " + filledSortByExistingZip);
      log("U列和E列都空，按简化地址补充（建议人工确认）: " + filledByTrimmedAddressNeedCheck);
      log("U列空白但未匹配，未修改: " + unmatchedSortBlank);

      if (detailLogs.length > 0) {
        log("\n变更/未匹配明细（最多显示50条）:");
        for (const line of detailLogs) {
          log(line);
        }
      }

      const newWs = XLSX.utils.aoa_to_sheet(targetRows);

      // 强制所有单元格按文本写出，尽量避免 Excel 打开时删除首位 0。
      Object.keys(newWs).forEach((addr) => {
        if (addr[0] === "!") return;
        const cell = newWs[addr];
        if (cell && cell.v != null) {
          cell.t = "s";
          cell.v = String(cell.v);
          cell.w = String(cell.v);
        }
      });
      targetWb.Sheets[targetSheetName] = newWs;

      const baseName = targetFile.name.replace(/\.(csv|xlsx|xls)$/i, "");
      const outputName = baseName + "_processed.csv";

      // 确保手机号是字符串（防止丢0）。
      for (let r = startRow; r < targetRows.length; r++) {
        const row = targetRows[r];
        if (!row) continue;

        if (row[phoneCol]) {
          row[phoneCol] = String(row[phoneCol]);
        }
      }

      // 生成 CSV。
      const csv = XLSX.utils.sheet_to_csv(newWs);

      // UTF-8 → SJIS 转换，适合日文CSV在部分日本业务软件/GPad里打开。
      const sjisArray = Encoding.convert(csv, {
        to: "SJIS",
        from: "UNICODE",
        type: "array"
      });

      const blob = new Blob([new Uint8Array(sjisArray)], {
        type: "text/csv"
      });

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = outputName;
      link.click();
      log("已生成下载文件: " + outputName);
    } catch (err) {
      console.error(err);
      resetLog("出错了：\n" + err.message);
    }
  });
</script>
</body>
</html>
