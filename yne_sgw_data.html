<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YNE大阪佐川データ生成</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>

<style>
body { font-family: Arial; background:#f5f7fa; padding:30px; }
.card { background:#fff; padding:20px; border-radius:10px; }
textarea { width:100%; height:120px; margin-top:10px; }
button { margin-top:15px; padding:10px; background:#1677ff; color:#fff; border:none; }
.log { margin-top:15px; background:#111827; color:#d1fae5; padding:10px; }
</style>
</head>

<body>

<div class="card">

<h2>YNE大阪佐川データ生成ツール</h2>

<input type="file" id="file">

<p>匹配数据（A-B格式，一行一条）:</p>
<textarea id="mapData" placeholder="YNE0001-123456"></textarea>

<button id="run">生成CSV</button>

<div id="log" class="log">等待操作...</div>

</div>

<script>

const $ = id => document.getElementById(id);

// 👉 日期（20260514）
function todayFull(){
  const d = new Date();
  return d.getFullYear().toString() +
         String(d.getMonth()+1).padStart(2,'0') +
         String(d.getDate()).padStart(2,'0');
}

// 👉 文件名用（0514）
function todayShort(){
  const d = new Date();
  return String(d.getMonth()+1).padStart(2,'0') +
         String(d.getDate()).padStart(2,'0');
}

// 👉 转字符串（防科学计数法）
function toStr(v){
  if(v===undefined || v===null) return "";
  return String(v).trim();
}

// 👉 CSV安全处理（绝对不触发引号）
function safe(v){
  if(v === undefined || v === null) return "";

  return String(v)
    .replace(/,/g, " ")       // 去逗号
    .replace(/"/g, "")        // 去引号
    .replace(/\r?\n/g, " ")   // 去换行
    .trim();
}

// 👉 解析匹配数据：支持普通 A-B，也兼容 A-\nB 这种被换行拆开的情况
function parseMap(mapText){
  const map = {};
  const cleaned = mapText.replace(/"/g, "");
  const matches = cleaned.matchAll(/(YNE\d+)\s*-\s*(\d{10,14})/g);

  for(const m of matches){
    map[m[1]] = m[2];
  }

  return map;
}

// 👉 下载 SJIS + CRLF CSV（日本系统常用）
function downloadSjisCsv(csvText, filename){
  const sjisArray = Encoding.convert(
    Encoding.stringToCode(csvText),
    {
      to: "SJIS",
      from: "UNICODE"
    }
  );

  const blob = new Blob([new Uint8Array(sjisArray)], {
    type: "text/csv"
  });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
   link.download = filename;
  link.click();

  setTimeout(() => URL.revokeObjectURL(link.href), 1000);
}

$("run").onclick = () => {

  const file = $("file").files[0];
  const mapText = $("mapData").value.trim();

  if(!file || !mapText){
    alert("请上传文件 + 输入匹配数据");
    return;
  }

  const reader = new FileReader();

  reader.onload = e => {

    const wb = XLSX.read(e.target.result, {type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1});

    // 👉 解析 A-B
    const map = parseMap(mapText);

    let result = [];

    for(let i=1;i<rows.length;i++){

      const r = rows[i];
      if(!r) continue;

      const key = toStr(r[4]); // E列

      if(!map[key]) continue;

      const newRow = [
        todayFull(),                 // A
        "14687210",                  // B
        "017",                       // C
        "5",                         // D
        toStr(map[key]),             // E
        toStr(r[32]),                // F = AG
        toStr(r[33]),                // G = AH
        toStr(map[key]),             // H
        safe(r[5]),                  // I = F
        toStr(r[34]),                // J = AI
        (parseFloat(r[6])||0).toFixed(1) // K = G
      ];

      result.push(newRow);
    }

    // ⭐ SJIS上传用CSV：CRLF换行，末尾也补一行换行
    const csv = result.map(row =>
      row.map(v => safe(v)).join(",")
    ).join("\r\n") + "\r\n";

    downloadSjisCsv(csv, "YNE" + todayShort() + ".csv");

    $("log").textContent = "完成，共生成 " + result.length + " 条数据（SJIS）";
  };

  reader.readAsArrayBuffer(file);
};

</script>

</body>
</html>
